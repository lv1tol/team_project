{% extends "products/product_list.html" %}

{% block content %}
<style>
    body {
        color: #d4d121;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-image: url("/sprites/back4.png");
        font-family: Arial, sans-serif;
    }

    .container {
        background-color: #1d1d1d;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.3);
        width: 420px;
        border: 2px solid #d4d121;
        text-align: center;
        margin: 5% 40% 0% 37.5%;
    }

    .avatar {
        width: 120px;
        height: 120px;
        object-fit: cover;
        margin-bottom: 15px;
    }

    form {
        text-align: left;
    }

    h2, h3 {
        color: #d4d121;
        margin-bottom: 15px;
    }

    input, select, textarea {
        width: 100%;
        padding: 8px;
        margin-bottom: 10px;
        background: #2c2c2c;
        border: 1px solid #d4d121;
        border-radius: 5px;
        color: #d4d121;
    }

    button {
        width: 100%;
        padding: 12px;
        border: 2px solid #d4d121;
        background-color: #272727;
        cursor: pointer;
        margin-top: 10px;
        color: #d4d121;
        font-weight: bold;
        border-radius: 6px;
        transition: 0.3s ease;
    }

    button:hover {
        background-color: #d4d121;
        color: #272727;
    }

    .toggle-password {
        background: none;
        border: none;
        color: #d4d121;
        cursor: pointer;
        font-size: 16px;
        margin-top: 10px;
        text-decoration: underline;
    }

    .toggle-password:hover {
        color: #fff;
    }

    hr {
        border: 1px solid #d4d121;
        margin: 20px 0;
    }

    .back-button {
        background: none;
        border: none;
        color: #d4d121;
        cursor: pointer;
        font-size: 14px;
        text-decoration: underline;
    }

    .back-button:hover {
        color: #fff;
    }

    .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.7);
        justify-content: center;
        align-items: center;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .modal.show {
        display: flex;
        opacity: 1;
        visibility: visible;
    }

    .modal-content {
        background-color: #1d1d1d;
        padding: 20px;
        border-radius: 10px;
        width: 350px;
        text-align: center;
        border: 2px solid #d4d121;
        transform: scale(0.8);
        transition: transform 0.3s ease;
    }

    .modal.show .modal-content {
        transform: scale(1);
    }

    .close-modal {
        background: none;
        border: none;
        color: #d4d121;
        font-size: 20px;
        cursor: pointer;
        float: right;
    }

    .close-modal:hover {
        color: white;
    }
</style>

<div class="container">
    <h2>Редагування профілю</h2>
    <img class="avatar" src="{{ user.profile.avatar.url }}" alt="Аватар">

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <h3>Змінити дані</h3>
        {{ user_form.as_p }}
        {{ profile_form.as_p }}

        <button type="submit">Зберегти зміни</button>
    </form>

    <hr>

    <button class="toggle-password" onclick="openModal()">Змінити пароль</button>

    <button class="back-button" onclick="window.location.href='{% url 'profile' %}'">Назад</button>
</div>

<div class="modal" id="passwordModal">
    <div class="modal-content">
        <h3>Змінити пароль</h3>
        <form method="post">
            {% csrf_token %}
            {{ password_form.as_p }}
            <button type="submit">Оновити пароль</button>
        </form>
    </div>
</div>

<script>
    function openModal() {
        document.getElementById("passwordModal").classList.add("show");
    }

    function closeModal() {
        document.getElementById("passwordModal").classList.remove("show");
    }

    window.onclick = function(event) {
        var modal = document.getElementById("passwordModal");
        if (event.target === modal) {
            closeModal();
        }
    }
</script>

{% endblock %}
