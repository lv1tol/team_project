{% extends "products/product_list.html" %}
{% block content %}
<body>
    <h1>Delete Product</h1>
    <p>Are you sure you want to delete the product "{{ product.name }}"?</p>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <button type="submit">Yes, delete</button>
        <a>Cancel</a>
    </form>
</body>
</html>
{% endblock %}
