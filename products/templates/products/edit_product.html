{% extends "products/product_list.html" %}
{% block content %}

<style>
    body {
        color:#d4d121;
        background-color: #272727;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: Arial, sans-serif;
    }
    form {
        justify-self: center;
        background-color: #1d1d1d;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
            padding-top: 5%;
            margin-top: 4%;
            height: 900px;
            width: 20%;
            border-left: 2px solid #d4d121;
            border-right: 2px solid #d4d121;
    }
    input, select, textarea {
            width: 95%;
            padding: 8px;
            margin-top: 5px;
            background-color: #272727;
            border-top: none;
            border-right: none;
            border-left: none;
            border-bottom: 2px solid #d4d121;
            border-radius: 5px;
            color: #d4d121;
            
        }
    button {
            margin-left: 30%;
            display: block;
            width: 40%;
            padding: 10px;
            border-top: 2px solid #d4d121;
            border-bottom: 2px solid #d4d121;
            border-right: none;
            border-left: none;
            background-color:#272727;
            cursor: pointer;
            margin-top: 15px;
            color: #d4d121;
        }
    button:hover {
        background-color: #d4d121;
        color: #272727;
    }
</style>

<body>
    <h1>Edit Product</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <label for="name">Product Name:</label>
        <input type="text" id="name" name="name" value="{{ product.name }}" required><br>

        <label for="description">Description:</label>
        <textarea id="description" name="description" ="{{ product.description }}" ></textarea><br>

        <label for="price">Price:</label>
        <input type="number" id="price" name="price" value="{{ product.price }}" required><br>

        <label for="image">Image:</label>
        <input type="file" id="Image" name="Image" value="{{ product.Image }}" required><br><br>
        <button href="/" type="submit">Save Changes</button>
    </form>
</body>
</html>
{% endblock %}
