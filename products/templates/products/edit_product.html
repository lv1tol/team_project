<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <h1>Edit Product</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <label for="name">Product Name:</label>
        <input type="text" id="name" name="name" value="{{ product.name }}" required><br>

        <label for="description">Description:</label>
        <textarea id="description" name="description" value="{{ product.description }}" ></textarea><br>

        <label for="price">Price:</label>
        <input type="number" id="price" name="price" value="{{ product.price }}" required><br>

        <label for="stock">Stock:</label>
        <input type="number" id="stock" name="stock" value="{{ product.stock }}" required><br>

        <button type="submit">Save Changes</button>
    </form>
</body>
</html>
