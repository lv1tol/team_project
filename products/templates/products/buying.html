    <title>Оформлення покупки</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-image: url("/sprites/back4.png");
            color: #d4d121;
        }
        input, select, textarea {
            width: 95%;
            padding: 8px;
            margin-top: 5px;
            background-color: #272727;
            border-top: none;
            border-right: none;
            border-left: none;
            border-bottom: 2px solid #d4d121;
            border-radius: 5px;
            color: #d4d121;
        }
        .container {
            width: 50%;
            margin: 0 auto;
            padding: 30px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            margin-top: 50px;
            background-color: #1d1d1d;
            border: #d4d121 2px solid;
        }
        h1 {
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            font-size: 16px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 4px;
        }
        button {
            width: 49.76%;
            padding: 10px;
            border: none;
            background-color: #272727;
            color: #d4d121;
            cursor: pointer;
            border-top: #d4d121 2px solid;
            border-bottom: #d4d121 2px solid;
        }
        button:hover {
            background-color: #d4d121;
            color: #272727;
        }
        .message {
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: red;
            display: none;
        }
        .error {
            color: red;
            font-size: 14px;
        }
    </style>
<body>

<div class="container">
    <h1>Оформлення покупки</h1>
    <form id="paymentForm">
        <div class="form-group">
            <label for="cardNumber">Номер карти:</label>
            <input type="text" id="cardNumber" placeholder="Введіть номер карти" required maxlength="16" minlength="16" pattern="\d{16}">
            <span id="cardNumberError" class="error"></span>
        </div>
        <div class="form-group">
            <label for="expiryDate">Дата закінчення:</label>
            <input type="text" id="expiryDate" placeholder="MM/YY" required maxlength="5" minlength="5" pattern="\d{2}/\d{2}">
            <span id="expiryError" class="error"></span>
        </div>
        <div class="form-group">
            <label for="cvv2">CVV2:</label>
            <input type="text" id="cvv2" placeholder="Введіть CVV2" required maxlength="3" pattern="\d{3}">
            <span id="cvv2Error" class="error"></span>
        </div>
        <br>
        <button type="submit">Оформити покупку</button>
        <button class="back-btn" onclick="window.location.href='/'">Повернутися на головну</button>
    </form>


    <div class="message" id="message">Гроші вкрадені! Все було фальшивкою!</div>
</div>

<script>
    document.getElementById('paymentForm').addEventListener('submit', function(e) {
        e.preventDefault(); 

        const cardNumber = document.getElementById('cardNumber').value;
        if (cardNumber.length !== 16 || isNaN(cardNumber)) {
            document.getElementById('cardNumberError').textContent = 'Номер карти має бути рівно 16 цифр!';
            return;
        }

        const expiryDate = document.getElementById('expiryDate').value;
        const [month, year] = expiryDate.split('/');
        
        if (!month || !year || month.length !== 2 || year.length !== 2 || isNaN(month) || isNaN(year)) {
            document.getElementById('expiryError').textContent = 'Невірний формат дати! Використовуйте ММ/РР';
            return;
        }

        const currentDate = new Date();
        const currentYear = currentDate.getFullYear().toString().slice(2);
        const currentMonth = currentDate.getMonth() + 1;

        if (parseInt(year) < parseInt(currentYear) || (parseInt(year) === parseInt(currentYear) && parseInt(month) < currentMonth)) {
            document.getElementById('expiryError').textContent = 'Дата картки не може бути в минулому!';
            return;
        }

        const cvv2 = document.getElementById('cvv2').value;
        if (!cvv2 || cvv2.length !== 3 || isNaN(cvv2)) {
            document.getElementById('cvv2Error').textContent = 'CVV2 має містити 3 цифри!';
            return;
        }

        setTimeout(function() {
            document.getElementById('message').style.display = 'block'; 
        }, 1000);
    });
</script>

</body>
</html>
