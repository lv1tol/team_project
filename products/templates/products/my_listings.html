<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Мій сайт{% endblock %}</title>
</head>
<body>
    <header>
        <h1>Ласкаво просимо</h1>
        <nav>
            <a href="/">Головна</a>
        </nav>
    </header>
    <h2>Мої оголошення</h2>
    <ul>
        {% for product in products %}
            <li>
                <h3>{{ product.name }}</h3>
                <p>Ціна: {{ product.price }} грн</p>
                <a href="{% url 'details' product.id %}">Детальніше</a>
                <a href="{% url 'edit_product' product.id %}">Редагувати</a>
                <a href="{% url 'delete_product' product.id %}">Видалити</a>
            </li>
        {% empty %}
            <p>У вас немає активних оголошень.</p>
        {% endfor %}
    </ul>
</body>
</html>
